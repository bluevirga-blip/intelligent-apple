<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextPressure 文字压力特效</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #1a1a1a;
    }
    .container {
      position: relative;
      height: 300px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // 把你之前的 TextPressure 组件代码完整粘贴到这里
    const dist = (a, b) => {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      return Math.sqrt(dx * dx + dy * dy);
    };

    const getAttr = (distance, maxDist, minVal, maxVal) => {
      const val = maxVal - Math.abs((maxVal * distance) / maxDist);
      return Math.max(minVal, val + minVal);
    };

    const debounce = (func, delay) => {
      let timeoutId;
      return (...args) => {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
          func.apply(this, args);
        }, delay);
      };
    };

    const TextPressure = ({
      text = 'Compressa',
      fontFamily = 'Compressa VF',
      fontUrl = 'https://res.cloudinary.com/dr6lvwubh/raw/upload/v1529908256/CompressaPRO-GX.woff2',
      width = true,
      weight = true,
      italic = true,
      alpha = false,
      flex = true,
      stroke = false,
      scale = false,
      textColor = '#FFFFFF',
      strokeColor = '#FF0000',
      strokeWidth = 2,
      className = '',
      minFontSize = 24
    }) => {
      const containerRef = React.useRef(null);
      const titleRef = React.useRef(null);
      const spansRef = React.useRef([]);
      const mouseRef = React.useRef({ x: 0, y: 0 });
      const cursorRef = React.useRef({ x: 0, y: 0 });
      const [fontSize, setFontSize] = React.useState(minFontSize);
      const [scaleY, setScaleY] = React.useState(1);
      const [lineHeight, setLineHeight] = React.useState(1);
      const chars = text.split('');

      React.useEffect(() => {
        const handleMouseMove = e => {
          cursorRef.current.x = e.clientX;
          cursorRef.current.y = e.clientY;
        };
        const handleTouchMove = e => {
          const t = e.touches[0];
          cursorRef.current.x = t.clientX;
          cursorRef.current.y = t.clientY;
        };
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('touchmove', handleTouchMove, { passive: true });
        if (containerRef.current) {
          const { left, top, width, height } = containerRef.current.getBoundingClientRect();
          mouseRef.current.x = left + width / 2;
          mouseRef.current.y = top + height / 2;
          cursorRef.current.x = mouseRef.current.x;
          cursorRef.current.y = mouseRef.current.y;
        }
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('touchmove', handleTouchMove);
        };
      }, []);

      const setSize = React.useCallback(() => {
        if (!containerRef.current || !titleRef.current) return;
        const { width: containerW, height: containerH } = containerRef.current.getBoundingClientRect();
        let newFontSize = containerW / (chars.length / 2);
        newFontSize = Math.max(newFontSize, minFontSize);
        setFontSize(newFontSize);
        setScaleY(1);
        setLineHeight(1);
        requestAnimationFrame(() => {
          if (!titleRef.current) return;
          const textRect = titleRef.current.getBoundingClientRect();
          if (scale && textRect.height > 0) {
            const yRatio = containerH / textRect.height;
            setScaleY(yRatio);
            setLineHeight(yRatio);
          }
        });
      }, [chars.length, minFontSize, scale]);

      React.useEffect(() => {
        const debouncedSetSize = debounce(setSize, 100);
        debouncedSetSize();
        window.addEventListener('resize', debouncedSetSize);
        return () => window.removeEventListener('resize', debouncedSetSize);
      }, [setSize]);

      React.useEffect(() => {
        let rafId;
        const animate = () => {
          mouseRef.current.x += (cursorRef.current.x - mouseRef.current.x) / 15;
          mouseRef.current.y += (cursorRef.current.y - mouseRef.current.y) / 15;
          if (titleRef.current) {
            const titleRect = titleRef.current.getBoundingClientRect();
            const maxDist = titleRect.width / 2;
            spansRef.current.forEach(span => {
              if (!span) return;
              const rect = span.getBoundingClientRect();
              const charCenter = {
                x: rect.x + rect.width / 2,
                y: rect.y + rect.height / 2
              };
              const d = dist(mouseRef.current, charCenter);
              const wdth = width ? Math.floor(getAttr(d, maxDist, 5, 200)) : 100;
              const wght = weight ? Math.floor(getAttr(d, maxDist, 100, 900)) : 400;
              const italVal = italic ? getAttr(d, maxDist, 0, 1).toFixed(2) : 0;
              const alphaVal = alpha ? getAttr(d, maxDist, 0, 1).toFixed(2) : 1;
              const newFontVariationSettings = `'wght' ${wght}, 'wdth' ${wdth}, 'ital' ${italVal}`;
              if (span.style.fontVariationSettings !== newFontVariationSettings) {
                span.style.fontVariationSettings = newFontVariationSettings;
              }
              if (alpha && span.style.opacity !== alphaVal) {
                span.style.opacity = alphaVal;
              }
            });
          }
          rafId = requestAnimationFrame(animate);
        };
        animate();
        return () => cancelAnimationFrame(rafId);
      }, [width, weight, italic, alpha]);

      const styleElement = React.useMemo(() => {
        return (
          <style>{`
            @font-face {
              font-family: '${fontFamily}';
              src: url('${fontUrl}');
              font-style: normal;
            }
            .stroke span {
              position: relative;
              color: ${textColor};
            }
            .stroke span::after {
              content: attr(data-char);
              position: absolute;
              left: 0;
              top: 0;
              color: transparent;
              z-index: -1;
              -webkit-text-stroke-width: ${strokeWidth}px;
              -webkit-text-stroke-color: ${strokeColor};
            }
          `}</style>
        );
      }, [fontFamily, fontUrl, textColor, strokeColor, strokeWidth]);

      return (
        <div ref={containerRef} className="relative w-full h-full overflow-hidden bg-transparent">
          {styleElement}
          <h1
            ref={titleRef}
            className={`text-pressure-title ${className} ${flex ? 'flex justify-between' : ''} ${stroke ? 'stroke' : ''} uppercase text-center`}
            style={{
              fontFamily,
              fontSize: fontSize + 'px',
              lineHeight,
              transform: `scale(1, ${scaleY})`,
              transformOrigin: 'center top',
              margin: 0,
              fontWeight: 100,
              color: stroke ? undefined : textColor
            }}
          >
            {chars.map((char, i) => (
              <span key={i} ref={el => (spansRef.current[i] = el)} data-char={char} className="inline-block">
                {char}
              </span>
            ))}
          </h1>
        </div>
      );
    };

    // 渲染组件到页面
    function App() {
      return (
        <div className="container">
          <TextPressure 
            text="Hello World" 
            textColor="#ffffff"
            minFontSize={36}
            stroke={true}
            strokeColor="#ffd700"
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
